<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Reports - YIC Amanah</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar admin">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                <img src="../assets/media/logo.svg" alt="YIC Amanah Logo" width="200" height="150">
            </div>
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Admin Workspace</p>
            <nav>
                <a href="admin_dashboard.html">Dashboard</a>
                <a href="manage_items.html">Manage Items</a>
                <a href="manage_claims.html">Claims requests</a>
                <a href="manage_lost_reports.html" class="active">Lost Reports</a>
            </nav>
            <div class="user-profile-menu" style="margin-top: auto; padding-top: 20px;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="user-avatar">KM</div>
                    <div>
                        <p style="color: #e0e0e0;"><strong>Khadijah Mahrous</strong></p>
                        <p style="font-size: 0.8rem; color: #aaa;">Administrator, YIC</p>
                    </div>
                </div>
                <div class="dropdown-content">
                    <a href="Index.html" class="logout-btn">Logout</a>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="welcome-header">
                <h1>Student Lost Reports</h1>
                <p style="color: #888;">View and update status of lost item reports.</p>
            </header>
            <section>
                <h3>All Lost Reports</h3>
                <div class="search-container" style="margin-top: 10px;">
                    <input type="text" class="search-bar" placeholder="Search by item or student...">
                </div>
                <table class="data-table admin-table">
                    <thead>
                        <tr><th>Student</th><th>Item</th><th>Category</th><th>Location</th><th>Date Lost</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="lost-reports-tbody">
                        <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="../assets/javascript/script.js"></script>
</body>
</html>
