<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login / Sign Up - YIC Amanah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <a href="Index.html" class="return-home-icon"><i class="fas fa-home"></i></a>

    <!-- Student Login Box -->
    <div class="auth-container" id="student-login-box">
        <div class="auth-header">
            <img src="../assets/media/logo.svg" alt="YIC Amanah Logo" width="200" height="150">
            <h2>Student Log in</h2>
        </div>
        <form id="student-login-form">
            <div class="form-group">
                <label for="student-email">Email:</label>
                <input type="email" id="student-email" required>
            </div>
            <div class="form-group">
                <label for="student-password">Password:</label>
                <input type="password" id="student-password" required>
            </div>
            <div class="center-btn-wrapper">
                <button type="submit" class="btn-auth">Log in as Student</button>
            </div>
        </form>
        <div class="switch-auth">
            Don't have a student account? <a href="#" id="show-student-signup">Register here</a>
        </div>
    </div>

    <!-- Student Signup Box (hidden initially) -->
    <div class="auth-container" id="student-signup-box" style="display: none;">
        <div class="auth-header">
            <img src="../assets/media/logo.svg" alt="YIC Amanah Logo" width="200" height="150">
            <h2>Create Student Account</h2>
        </div>
        <form id="student-signup-form">
            <div class="form-group">
                <label for="student-fullname">Full Name:</label>
                <input type="text" id="student-fullname" required>
            </div>
            <div class="form-group">
                <label for="student-reg-email">Email:</label>
                <input type="email" id="student-reg-email" required>
            </div>
            <div class="form-group">
                <label for="student-reg-password">Password:</label>
                <input type="password" id="student-reg-password" required>
            </div>
            <div class="form-group">
                <label for="student-confirm-password">Confirm Password:</label>
                <input type="password" id="student-confirm-password" required>
            </div>
            <div class="center-btn-wrapper">
                <button type="submit" class="btn-auth">Sign Up</button>
            </div>
        </form>
        <div class="switch-auth">
            Already have an account? <a href="#" id="show-student-login">Login here</a>
        </div>
    </div>

    <script src="../assets/javascript/script.js"></script>
</body>
</html>
