<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Lost Item - YIC Amanah</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                <img src="logo-placeholder.png" alt="Logo" width="30" height="30" style="border-radius: 5px; background-color: #eee;">
                <h2 style="margin: 0;">YIC Amanah</h2>
            </div>
            
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Campus Services</p>

            <nav>
                <a href="Student_dashboard.html">Dashboard</a>
                <a href="report_item.html" class="active">Report Lost</a>
                <a href="found_items.html">Found Items</a>
                <a href="my_claims.html">My Claims</a>
            </nav>

            <div class="user-profile-menu" style="margin-top: auto; padding-top: 20px; border-top: 1px solid #eee;">
                <p><strong>Student Name</strong></p>
                <p style="font-size: 0.8rem;">Student, YIC</p>
                
                <div class="dropdown-content">
                    <a href="auth.html" class="logout-btn">Logout</a>
                </div>
            </div>
            
        </aside>

        <main class="main-content">
            <header class="welcome-header">
                <h1>Report Lost Items</h1>
            </header>

            <div class="form-container">
                <h2>Report a Lost Item</h2>
                <form action="../php/report_item.php" method="POST">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" name="item_name" placeholder="e.g. iPhone 13 Pro" required>
                    </div>
                    <div class="form-group">
                        <label for="date-lost">Date Lost</label>
                        <input type="date" id="date-lost" name="date_lost" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category">
                            <option value="electronics">Electronics</option>
                            <option value="personal">Personal Items</option>
                            <option value="books">Books/Stationary</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">Location Last Seen</label>
                        <input type="text" id="location" name="location" placeholder="e.g. Library, Floor 2" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="4" placeholder="Describe colors, marks, or specific details..."></textarea>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" style="flex: 2;">Submit Report</button>
                        <button type="reset" style="flex: 1; background-color: #ccc;">Cancel</button>
                    </div>
                </form>
            </div>

          <section style="margin-top: 40px;">
                <h3>My Past Reports</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Date</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>iPhone 13 Pro</td>
                            <td>April 3</td>
                            <td>Cafeteria</td>
                            <td><span class="status-badge">Pending</span></td>
                            <td>
                                <a href="#" style="display: inline-block; padding: 5px 12px; background-color: #5a32a8; color: white; text-decoration: none; border-radius: 4px; font-size: 0.8rem;">View</a>
                            </td>
                        </tr>
                        <tr>
                            <td>Blue bag</td>
                            <td>March 21</td>
                            <td>Building B</td>
                            <td><span class="status-badge">Found</span></td>
                            <td>
                                <a href="#" style="display: inline-block; padding: 5px 12px; background-color: #5a32a8; color: white; text-decoration: none; border-radius: 4px; font-size: 0.8rem;">View</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

</body>
</html>
